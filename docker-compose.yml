services:
  db:
    image: postgres:16-alpine
    container_name: customer_api_db
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # This maps the seed.sql file to the initdb directory inside the container
      # Scripts in this directory are run automatically when the database is initialized
      - ./app/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      retries: 5
      interval: 5s

  api:
    build: .
    env_file: .env
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
